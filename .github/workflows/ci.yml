name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx vitest run tests/validation.test.ts tests/security.test.ts

  integration:
    name: Integration Test (Bridge)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run build
      - run: pip install git+https://github.com/AryanBV/pdf-edit-engine.git reportlab
      - run: python tests/generate_fixtures.py
      - run: npx vitest run tests/bridge.test.ts
        env:
          PDF_EDIT_PYTHON: python3
